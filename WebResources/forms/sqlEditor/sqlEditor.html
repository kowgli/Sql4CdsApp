<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>SQL Editor</title>

    <!-- Tabulator CSS from CDN (Tabulator is MIT licensed) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tabulator-tables@6.4.0/dist/css/tabulator.min.css">

    <style>
        /* Fluent-ish palette / spacing (approximation) */
        :root {
            --pp-bg: #f3f2f1;
            --pp-surface: #ffffff;
            --pp-border: #edebe9;
            --pp-text: #323130;
            --pp-muted: #605e5c;
            --pp-primary: #0078d4;
            --pp-primary-hover: #106ebe;
            --pp-danger: #a4262c;
            --pp-shadow: 0 1px 2px rgba(0,0,0,.08);
            --radius: 6px;
            --pad: 8px;
            --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            --font: "Segoe UI", system-ui, -apple-system, Arial, sans-serif;
        }

        html, body {
            height: 100%;
            margin: 0;
            background: var(--pp-bg);
            font-family: var(--font);
            color: var(--pp-text);
        }

        #app {
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 8px;
            box-sizing: border-box;
        }

        #toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--pp-surface);
            border: 1px solid var(--pp-border);
            border-radius: var(--radius);
            box-shadow: var(--pp-shadow);
            padding: var(--pad);
        }

        .btn {
            appearance: none;
            border: 1px solid transparent;
            border-radius: 4px;
            padding: 6px 12px;
            font-size: 13px;
            cursor: pointer;
            user-select: none;
        }

        .btn-primary {
            background: var(--pp-primary);
            color: #fff;
        }

            .btn-primary:hover {
                background: var(--pp-primary-hover);
            }

        .btn-ghost {
            background: transparent;
            border-color: var(--pp-border);
            color: var(--pp-text);
        }

            .btn-ghost:hover {
                background: #faf9f8;
            }

        .spacer {
            flex: 1;
        }

        #status {
            font-size: 12px;
            color: var(--pp-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 55%;
        }

        #main {
            flex: 1;
            min-height: 0;
            display: flex;
            gap: 8px;
        }

        .panel {
            background: var(--pp-surface);
            border: 1px solid var(--pp-border);
            border-radius: var(--radius);
            box-shadow: var(--pp-shadow);
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        #editorPanel {
            flex: 1.1;
            min-width: 420px;
        }

        #editorHeader, #gridHeader {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--pp-border);
            padding: 8px 10px;
            font-size: 12px;
            color: var(--pp-muted);
        }

        #editor {
            flex: 1;
            min-height: 0;
            font-family: var(--mono);
            border-bottom-left-radius: var(--radius);
            border-bottom-right-radius: var(--radius);
        }

        #gridPanel {
            flex: 0.9;
            min-width: 360px;
        }

        #grid {
            flex: 1;
            min-height: 0;
        }

        #errorBox {
            display: none;
            margin-top: 8px;
            padding: 8px 10px;
            border: 1px solid rgba(164,38,44,.25);
            background: rgba(164,38,44,.06);
            color: var(--pp-danger);
            border-radius: 6px;
            font-size: 12px;
            white-space: pre-wrap;
        }

        /* Make Tabulator look a bit closer to Power Platform */
        .tabulator {
            border: none;
            font-family: var(--font);
        }

            .tabulator .tabulator-header {
                background: #faf9f8;
                border-bottom: 1px solid var(--pp-border);
            }
    </style>

    <!-- Ace from CDN (Ace is embeddable and supports modes/themes) -->
    <script src="https://cdn.jsdelivr.net/npm/ace-builds@1.32.3/src-min-noconflict/ace.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ace-builds@1.32.3/src-min-noconflict/mode-sql.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ace-builds@1.32.3/src-min-noconflict/theme-sqlserver.js"></script>

    <!-- Tabulator from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/tabulator-tables@6.4.0/dist/js/tabulator.min.js"></script>
</head>

<body>
    <div id="app">
        <div id="toolbar">
            <button class="btn btn-primary" id="runBtn" title="Run (Ctrl+Enter)">Run</button>
            <button class="btn btn-ghost" id="formatBtn" title="Basic format (simple)">Format</button>
            <button class="btn btn-ghost" id="clearBtn" title="Clear results">Clear results</button>

            <div class="spacer"></div>
            <div id="status">Ready</div>
        </div>

        <div id="main">
            <div class="panel" id="editorPanel">
                <div id="editorHeader">
                    <span>SQL editor</span>
                    <span style="font-family:ui-monospace,Consolas,monospace">Ctrl+Enter to run</span>
                </div>
                <div id="editor"></div>
                <div id="errorBox"></div>
            </div>

            <div class="panel" id="gridPanel">
                <div id="gridHeader">
                    <span>Results</span>
                    <span id="rowsInfo">0 rows</span>
                </div>
                <div id="grid"></div>
            </div>
        </div>
    </div>

    <script>
        // Optional: access model-driven context if you need it
        // (web resources run in the Dataverse app security context) 【2-d0d246】
        const Xrm = (window.parent && window.parent.Xrm) ? window.parent.Xrm : null;

        // -----------------------------
        // Ace setup (SQL)
        // -----------------------------
        const editor = ace.edit("editor");
        editor.session.setMode("ace/mode/sql");
        editor.setTheme("ace/theme/sqlserver");
        editor.setOptions({
            fontSize: "13px",
            showPrintMargin: false,
            wrap: true,
            tabSize: 2,
            useSoftTabs: true
        });

        editor.setValue(
            `-- Write SQL here. You handle execution.
-- Ctrl+Enter to run.

SELECT *
FROM account
WHERE statecode = 0;
`, -1);

        editor.commands.addCommand({
            name: "runQuery",
            bindKey: { win: "Ctrl-Enter", mac: "Command-Enter" },
            exec: () => run()
        });

        // -----------------------------
        // Tabulator setup (grid)
        // -----------------------------
        let table = new Tabulator("#grid", {
            layout: "fitDataFill",
            placeholder: "No results yet",
            height: "100%",
            selectable: true,
            clipboard: true
        });

        // -----------------------------
        // UI helpers
        // -----------------------------
        const statusEl = document.getElementById("status");
        const errorBox = document.getElementById("errorBox");
        const rowsInfo = document.getElementById("rowsInfo");

        function setStatus(text) { statusEl.textContent = text; }
        function showError(errText) {
            errorBox.style.display = "block";
            errorBox.textContent = errText;
        }
        function clearError() {
            errorBox.style.display = "none";
            errorBox.textContent = "";
        }

        function setGridFromResult(result) {
            // Expect:
            // { columns: ["a","b"], rows: [ {a:1,b:"x"}, ... ] } OR rows: [ [1,"x"], ... ]
            const cols = result.columns || [];
            const rows = result.rows || [];

            const tabColumns = cols.map(c => ({
                title: c,
                field: c,
                headerFilter: true,
                headerSort: true,
                resizable: true
            }));

            let dataObjects;
            if (rows.length > 0 && Array.isArray(rows[0])) {
                dataObjects = rows.map(r => {
                    const o = {};
                    cols.forEach((c, i) => o[c] = r[i]);
                    return o;
                });
            } else {
                dataObjects = rows;
            }

            table.setColumns(tabColumns);
            table.setData(dataObjects);
            rowsInfo.textContent = `${dataObjects.length} rows`;
        }

        // -----------------------------
        // Replace this with YOUR execution
        // -----------------------------
        async function executeQuery(sqlText) {
            // Replace with your backend call (fetch/Xrm.WebApi/etc.)
            // Note: CSP connect-src may block external calls. 【1-d6fba3】

            // Demo result (remove):
            return {
                columns: ["message", "length"],
                rows: [
                    { message: "Replace executeQuery(sqlText) with your API call", length: sqlText.length }
                ]
            };
        }

        // -----------------------------
        // Run flow
        // -----------------------------
        async function run() {
            clearError();
            setStatus("Running...");
            document.getElementById("runBtn").disabled = true;

            const sqlText = editor.getValue();

            try {
                const t0 = performance.now();
                const result = await executeQuery(sqlText);
                const t1 = performance.now();

                setGridFromResult(result);
                setStatus(`Success in ${(t1 - t0).toFixed(0)} ms`);
            } catch (e) {
                showError(e && e.stack ? e.stack : String(e));
                setStatus("Error");
            } finally {
                document.getElementById("runBtn").disabled = false;
            }
        }

        // Toolbar
        document.getElementById("runBtn").addEventListener("click", run);

        document.getElementById("clearBtn").addEventListener("click", () => {
            table.clearData();
            table.setColumns([]);
            rowsInfo.textContent = "0 rows";
            setStatus("Cleared");
            clearError();
        });

        document.getElementById("formatBtn").addEventListener("click", () => {
            // Very simple formatter to keep it drop-in
            const s = editor.getValue()
                .replace(/\t/g, "  ")
                .replace(/[ \t]+$/gm, "")
                .trimEnd();
            editor.setValue(s + "\n", -1);
            setStatus("Formatted");
        });
    </script>
</body>
</html>
