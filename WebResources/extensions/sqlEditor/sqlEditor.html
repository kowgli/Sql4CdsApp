<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>SQL Editor</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tabulator-tables@6.4.0/dist/css/tabulator.min.css">
    <link href="css/sqlEditor.bundle.css" rel="stylesheet" />

    <script src="../../../ClientGlobalContext.js.aspx" type="text/javascript"></script>

    <script src="https://cdn.jsdelivr.net/npm/sql-formatter@15/dist/sql-formatter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ace-builds@1.32.3/src-min-noconflict/ace.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ace-builds@1.32.3/src-min-noconflict/mode-sql.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ace-builds@1.32.3/src-min-noconflict/theme-sqlserver.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ace-builds@1.32.3/src-min-noconflict/ext-language_tools.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tabulator-tables@6.4.0/dist/js/tabulator.min.js"></script>
</head>

<body>
    <div id="app">

        <!-- Collapsed rail: shown when the object explorer is minimized -->
        <div id="metaRail" title="Show Object Explorer">
            <button class="meta-rail-expand" id="expandMetaBtn" title="Show Object Explorer" aria-label="Show Object Explorer">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M5.7 2.3l1.06 1.06L2.62 7.5h11.13v1.5H2.62l4.14 4.14L5.7 14.2.34 8.84a.75.75 0 0 1 0-1.06L5.7 2.3z" transform="scale(-1,1) translate(-16,0)"/></svg>
            </button>
            <span class="meta-rail-label">Object Explorer</span>
        </div>

        <!-- Object explorer: full height (top to bottom) on the far left -->
        <div class="panel" id="metadataPanel">
            <div class="panel-header meta-header">
                <span class="panel-title">Object Explorer</span>
                <div class="meta-header-actions">
                    <button class="meta-refresh-btn" id="refreshMetaBtn" title="Refresh metadata">
                        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M13.65 2.35A8 8 0 1 0 16 8h-1.5A6.5 6.5 0 1 1 8 1.5c1.8 0 3.42.73 4.6 1.91L10 6h6V0l-2.35 2.35z"/></svg>
                    </button>
                    <button class="meta-refresh-btn" id="collapseMetaBtn" title="Hide Object Explorer" aria-label="Hide Object Explorer">
                        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M5.7 2.3l1.06 1.06L2.62 7.5h11.13v1.5H2.62l4.14 4.14L5.7 14.2.34 8.84a.75.75 0 0 1 0-1.06L5.7 2.3z"/></svg>
                    </button>
                </div>
            </div>
            <div class="meta-search">
                <svg class="meta-search-icon" width="13" height="13" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M6.5 1a5.5 5.5 0 0 1 4.38 8.82l3.65 3.65-1.06 1.06-3.65-3.65A5.5 5.5 0 1 1 6.5 1zm0 1.5a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"/></svg>
                <input id="metaSearch" type="text" placeholder="Filter tables &amp; columns…" autocomplete="off" spellcheck="false" />
                <button class="meta-search-clear" id="metaSearchClear" type="button" title="Clear (Esc)" aria-label="Clear filter">
                    <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M4.5 3.5L8 7l3.5-3.5 1 1L9 8l3.5 3.5-1 1L8 9l-3.5 3.5-1-1L7 8 3.5 4.5z"/></svg>
                </button>
            </div>
            <div id="metaTree"></div>
        </div>

        <div id="metaDivider" title="Drag to resize"></div>

        <!-- Right pane: tab strip + command bar on top, editor + results below -->
        <div id="rightPane">

        <!-- Browser-style tab strip (one tab = one query document) -->
        <div id="tabStrip">
            <div id="tabList"></div>
            <button id="newTabBtn" class="tab-new" title="New query (Ctrl+T)" aria-label="New query">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M7.25 7.25V2h1.5v5.25H14v1.5H8.75V14h-1.5V8.75H2v-1.5z"/></svg>
            </button>
        </div>

        <!-- Fluent UI command bar -->
        <div id="toolbar">
            <button class="cmd-btn cmd-btn-primary" id="runBtn" title="Run (Ctrl+Enter)">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M3 2.5l10 5.5-10 5.5V2.5z"/></svg>
                Run
            </button>
            <div class="cmd-sep"></div>
            <button class="cmd-btn" id="formatBtn" title="Format SQL">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M2 3h12v1.5H2zm0 4h8v1.5H2zm0 4h10v1.5H2z"/></svg>
                Format
            </button>
            <button class="cmd-btn" id="clearBtn" title="Clear results">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M4.5 3.5L8 7l3.5-3.5 1 1L9 8l3.5 3.5-1 1L8 9l-3.5 3.5-1-1L7 8 3.5 4.5z"/></svg>
                Clear results
            </button>
            <div class="cmd-sep"></div>
            <label class="opt-check"><input type="checkbox" id="optBlockDelete" checked /> Block DELETE w/o WHERE</label>
            <label class="opt-check"><input type="checkbox" id="optBlockUpdate" checked /> Block UPDATE w/o WHERE</label>
            <label class="opt-check"><input type="checkbox" id="optBypassPlugins" /> Bypass plugins</label>
            <label class="opt-check"><input type="checkbox" id="optLocalTime" /> Local time zone</label>
            <div class="cmd-sep"></div>
            <label class="opt-check"><input type="checkbox" id="optAutoSuggest" checked /> Auto-suggest</label>
        </div>

        <!-- Editor + resizable divider + results, stacked vertically -->
        <div id="main">
            <div class="panel" id="editorPanel">
                <div id="editor"></div>
                <div id="errorBox"></div>
            </div>

            <div id="divider" title="Drag to resize"></div>

            <div class="panel" id="gridPanel">
                <div class="panel-header">
                    <span class="panel-title">Results</span>
                    <span id="status" class="panel-status">Ready</span>
                    <span id="rowsInfo" class="panel-result-info"></span>
                </div>
                <div id="resultsBody">
                    <div id="resizeSkeleton"></div>
                    <div id="loadingOverlay">
                        <div class="loading-spinner"></div>
                        <div id="loadingTimer">0s</div>
                        <button class="cmd-btn cmd-btn-cancel" id="cancelBtn" title="Stop waiting for results">
                            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M4.5 3.5L8 7l3.5-3.5 1 1L9 8l3.5 3.5-1 1L8 9l-3.5 3.5-1-1L7 8 3.5 4.5z"/></svg>
                            Cancel
                        </button>
                    </div>
                    <div id="commandMessage"></div>
                    <div id="grid"></div>
                </div>
            </div>
        </div>

        </div>
    </div>

    <script src="js/sqlEditor.bundle.js"></script>
</body>
</html>
